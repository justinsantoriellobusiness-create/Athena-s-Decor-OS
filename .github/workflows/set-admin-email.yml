name: Set Admin Email

on:
  workflow_dispatch: {}

jobs:
  set:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli 2>/dev/null

      - name: Set ADMIN_EMAIL
        run: |
          SERVICE_ID="f0ead486-176e-4541-98cb-325e83514298"
          railway variables --service "$SERVICE_ID" --set "ADMIN_EMAIL=justinsantoriellobusiness@gmail.com"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
