name: Generate DB Migrations

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate migration SQL (no DB connection required for first generation)
        run: DATABASE_URL="mysql://placeholder:placeholder@localhost:3306/placeholder" pnpm exec drizzle-kit generate

      - name: Commit and push migration files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drizzle/
          if git diff --cached --quiet; then
            echo "No migration changes to commit"
          else
            git commit -m "Generate initial Drizzle migration SQL files"
            git push origin HEAD:main
          fi
