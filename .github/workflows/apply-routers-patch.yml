name: Apply Routers Integrations Patch

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Apply patch
        run: patch -p1 --forward < .github/routers-integrations.patch

      - name: Verify TypeScript-ish sanity (no unresolved conflict markers)
        run: |
          if grep -qE '^(<<<<<<<|=======|>>>>>>>)' server/routers.ts; then
            echo "Patch left conflict markers - aborting"
            exit 1
          fi

      - name: Clean up patch + workflow files and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm .github/routers-integrations.patch
          git rm .github/workflows/apply-routers-patch.yml
          git add server/routers.ts
          git commit -m "Apply integrations router patch (auto-generated, self-cleaning)"
          git push origin HEAD:main
