name: Install Claude Code

on:
  workflow_dispatch: {}
  push:
    branches:
      - 'main'

jobs:
  install-claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Claude Code
        uses: pleaseai/setup-claude-code@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }})     # create this secret in repo Settings → Secrets → Actions
          marketplaces: your-org/private-plugins  # replace with your marketplace slug(s)
          plugins: private-plugin@your-org        # replace with your plugin identifier(s)

      - name: Verify installation
        run: |
          echo "Claude Code step completed. Check action logs for details."
