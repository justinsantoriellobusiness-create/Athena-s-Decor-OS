name: Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Auto-discover service and deploy
        run: |
          # Find the first service in the project
          SERVICE_ID=$(railway status --json 2>/dev/null | grep -o '"serviceId":"[^"]*"' | head -1 | cut -d'"' -f4)

          if [ -z "$SERVICE_ID" ]; then
            echo "Deploying to project (single service auto-selected)"
            railway up --detach
          else
            echo "Deploying to service: $SERVICE_ID"
            railway up --detach --service "$SERVICE_ID"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
