name: Test Live LLM Wiring (self-cleaning)

on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm@10
      - run: pnpm install --no-frozen-lockfile
      - run: npm install -g @railway/cli
      - name: Call the real Anthropic API through invokeLLM, using Railway's live env vars
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          SERVICE_ID="f0ead486-176e-4541-98cb-325e83514298"
          railway run --service "$SERVICE_ID" -- npx tsx scripts/test-llm-live.ts
