name: Push DB Schema to Railway

on:
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm and Railway CLI
        run: npm install -g pnpm@10 @railway/cli

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Find public DB URL and push schema
        run: |
          set -e
          WEB_SERVICE_ID="f0ead486-176e-4541-98cb-325e83514298"

          VARS=$(railway variables --service "$WEB_SERVICE_ID" --kv 2>&1 || true)

          echo "=== Variable names available on web service (values hidden) ==="
          echo "$VARS" | cut -d'=' -f1

          # Try to find any variable whose value is a public mysql proxy URL
          LINE=$(echo "$VARS" | grep -iE '^[A-Z0-9_]+=mysql://.*proxy\.rlwy\.net' | head -1 || true)

          if [ -z "$LINE" ]; then
            echo "No public mysql:// proxy URL found among web service's variables."
            echo "Will attempt DATABASE_URL as-is (may be internal-only and fail)."
            LINE=$(echo "$VARS" | grep -E '^DATABASE_URL=' | head -1 || true)
          fi

          if [ -z "$LINE" ]; then
            echo "No DATABASE_URL found at all on web service."
            exit 1
          fi

          PUBLIC_DB_URL=$(echo "$LINE" | cut -d'=' -f2-)
          FOUND_VAR_NAME=$(echo "$LINE" | cut -d'=' -f1)

          echo "::add-mask::$PUBLIC_DB_URL"
          echo "Using variable: $FOUND_VAR_NAME"

          export DATABASE_URL="$PUBLIC_DB_URL"
          yes | pnpm exec drizzle-kit push
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
