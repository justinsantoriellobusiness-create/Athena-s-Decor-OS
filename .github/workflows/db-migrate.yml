name: Push DB Schema to Railway

on:
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Find public DB URL and push schema
        run: |
          set -e

          GQL_ENDPOINT="https://backboard.railway.app/graphql/v2"

          gql() {
            curl -s -X POST "$GQL_ENDPOINT" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$1"
          }

          PROJECT_JSON=$(gql "$(node -e '
            const q = `query($id:String!){ project(id:$id){ services{ edges{ node{ id name } } } environments{ edges{ node{ id name } } } } }`;
            console.log(JSON.stringify({ query: q, variables: { id: process.env.RAILWAY_PROJECT_ID } }));
          ')")

          SERVICE_IDS=$(echo "$PROJECT_JSON" | node -e '
            let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{
              try{
                const j=JSON.parse(d);
                const edges=j.data.project.services.edges;
                console.log(edges.map(e=>e.node.id).join("\n"));
              }catch(e){ console.error("PARSE_ERROR"); }
            });
          ')

          ENV_ID=$(echo "$PROJECT_JSON" | node -e '
            let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{
              try{
                const j=JSON.parse(d);
                const edges=j.data.project.environments.edges;
                console.log(edges[0].node.id);
              }catch(e){ console.error(""); }
            });
          ')

          if [ -z "$SERVICE_IDS" ] || [ -z "$ENV_ID" ]; then
            echo "Could not resolve services/environment from Railway GraphQL API."
            echo "Project response (safe - no secrets in this object):"
            echo "$PROJECT_JSON"
            exit 1
          fi

          echo "Found $(echo "$SERVICE_IDS" | wc -l) service(s), environment $ENV_ID"

          PUBLIC_DB_URL=""
          FOUND_VAR_NAME=""

          for SID in $SERVICE_IDS; do
            VARS_JSON=$(gql "$(node -e "
              const q = \`query(\\\$p:String!,\\\$e:String!,\\\$s:String!){ variables(projectId:\\\$p,environmentId:\\\$e,serviceId:\\\$s) }\`;
              console.log(JSON.stringify({ query: q, variables: { p: process.env.RAILWAY_PROJECT_ID, e: process.env.ENV_ID, s: '$SID' } }));
            ")")

            LINE=$(echo "$VARS_JSON" | node -e '
              let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>{
                try{
                  const j=JSON.parse(d);
                  const vars=j.data.variables || {};
                  for (const [k,v] of Object.entries(vars)) {
                    if (typeof v === "string" && /^mysql:\/\/.*proxy\.rlwy\.net/i.test(v)) {
                      console.log(k+"="+v);
                      process.exit(0);
                    }
                  }
                }catch(e){}
              });
            ' 2>/dev/null || true)

            if [ -n "$LINE" ]; then
              FOUND_VAR_NAME=$(echo "$LINE" | cut -d'=' -f1)
              PUBLIC_DB_URL=$(echo "$LINE" | cut -d'=' -f2-)
              break
            fi
          done

          if [ -z "$PUBLIC_DB_URL" ]; then
            echo "No public mysql:// proxy URL found on any service in this project."
            exit 1
          fi

          echo "::add-mask::$PUBLIC_DB_URL"
          echo "Using variable '$FOUND_VAR_NAME'"

          export DATABASE_URL="$PUBLIC_DB_URL"
          set +e
          yes | pnpm exec drizzle-kit push
          PUSH_EXIT=$?
          set -e

          if [ $PUSH_EXIT -ne 0 ]; then
            echo "drizzle-kit push exited with code $PUSH_EXIT"
            exit 1
          fi

          echo "Schema push completed, verifying tables exist..."
          node -e "
            const mysql = require('mysql2/promise');
            (async () => {
              const conn = await mysql.createConnection(process.env.DATABASE_URL);
              const [rows] = await conn.query(\"SHOW TABLES LIKE 'automation_settings'\");
              await conn.end();
              if (rows.length === 0) {
                console.error('VERIFICATION FAILED: automation_settings table still does not exist.');
                process.exit(1);
              }
              console.log('VERIFIED: automation_settings table exists.');
            })().catch(err => { console.error('Verification error:', err.message); process.exit(1); });
          "
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
