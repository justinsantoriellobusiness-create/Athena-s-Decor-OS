name: Push DB Schema to Railway

on:
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm and Railway CLI
        run: npm install -g pnpm@10 @railway/cli

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Find public DB URL and push schema
        run: |
          set -e

          echo "Discovering services in project..."
          STATUS_JSON=$(railway status --json 2>/dev/null || true)
          SERVICE_IDS=$(echo "$STATUS_JSON" | grep -o '"serviceId":"[^"]*"' | cut -d'"' -f4 | sort -u)

          if [ -z "$SERVICE_IDS" ]; then
            echo "No services discovered from railway status --json"
            exit 1
          fi

          PUBLIC_DB_URL=""
          FOUND_VAR_NAME=""
          FOUND_SERVICE_ID=""

          for SID in $SERVICE_IDS; do
            VARS=$(railway variables --service "$SID" --kv 2>/dev/null || true)
            if [ -z "$VARS" ]; then
              continue
            fi
            # Look for a variable whose value is a public mysql connection string
            LINE=$(echo "$VARS" | grep -iE '^[A-Z0-9_]+=mysql://.*proxy\.rlwy\.net' | head -1 || true)
            if [ -n "$LINE" ]; then
              FOUND_VAR_NAME=$(echo "$LINE" | cut -d'=' -f1)
              PUBLIC_DB_URL=$(echo "$LINE" | cut -d'=' -f2-)
              FOUND_SERVICE_ID="$SID"
              break
            fi
          done

          if [ -z "$PUBLIC_DB_URL" ]; then
            echo "Could not find a public mysql:// proxy URL in any service's variables."
            echo "Service IDs checked: $SERVICE_IDS"
            exit 1
          fi

          # Mask the credential so it can never leak into logs from this point on
          echo "::add-mask::$PUBLIC_DB_URL"

          echo "Found public DB URL in variable '$FOUND_VAR_NAME' on service $FOUND_SERVICE_ID"
          echo "Pushing schema..."

          export DATABASE_URL="$PUBLIC_DB_URL"
          yes | pnpm exec drizzle-kit push
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
