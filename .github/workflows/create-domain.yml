name: Create Railway Domain

on:
  workflow_dispatch: {}

jobs:
  create-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Create domain via CLI with service selection
        run: |
          npm install -g @railway/cli 2>/dev/null

          SERVICE_ID="f0ead486-176e-4541-98cb-325e83514298"

          echo "=== Trying railway domain with --service flag ==="
          railway domain --service "$SERVICE_ID" 2>&1 || true

          echo "=== Trying railway service then domain ==="
          printf "Athena-s-Decor-OS\n" | railway service 2>&1 || true
          railway domain 2>&1 || true

          echo "=== Checking available railway domain subcommands ==="
          railway domain --help 2>&1 || true
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
