name: Create Railway Domain

on:
  workflow_dispatch: {}

jobs:
  create-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Create Railway subdomain
        run: |
          npm install -g @railway/cli

          # Get service info
          echo "Linking to project..."
          railway link --project "$RAILWAY_PROJECT_ID" 2>/dev/null || true

          # Create domain via CLI
          echo "Creating domain..."
          RESULT=$(railway domain 2>&1)
          echo "Domain result: $RESULT"

          # Also try to get the current domain
          STATUS=$(railway status 2>&1)
          echo "Status: $STATUS"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
