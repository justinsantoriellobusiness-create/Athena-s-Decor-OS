name: Create Railway Domain

on:
  workflow_dispatch: {}

jobs:
  create-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Create domain via GraphQL
        run: |
          SERVICE_ID="f0ead486-176e-4541-98cb-325e83514298"
          ENV_ID="2b72de05-138e-42e2-a8f6-0b9cb03aeed7"

          RESP=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceDomainCreate(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { id domain } }\"}")
          echo "Response: $RESP"

          DOMAIN=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['serviceDomainCreate']['domain'])" 2>/dev/null || echo "")
          if [ -n "$DOMAIN" ]; then
            echo "SUCCESS: https://$DOMAIN"
          else
            echo "Note: $RESP"
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
