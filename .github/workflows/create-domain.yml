name: Create Railway Domain

on:
  workflow_dispatch: {}

jobs:
  create-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Find project, create domain
        run: |
          # List all projects to find correct IDs
          ALL=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ me { projects { edges { node { id name services { edges { node { id name } } } environments { edges { node { id name } } } } } } } }"}')
          echo "ALL PROJECTS: $ALL"

          # Extract project, service (non-mysql), environment IDs
          PROJECT_ID=$(echo "$ALL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['me']['projects']['edges'][0]['node']['id'])")
          SERVICE_ID=$(echo "$ALL" | python3 -c "import sys,json; d=json.load(sys.stdin); svcs=d['data']['me']['projects']['edges'][0]['node']['services']['edges']; print([s['node']['id'] for s in svcs if 'mysql' not in s['node']['name'].lower()][0])")
          ENV_ID=$(echo "$ALL" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['me']['projects']['edges'][0]['node']['environments']['edges'][0]['node']['id'])")
          echo "Project: $PROJECT_ID  Service: $SERVICE_ID  Env: $ENV_ID"

          # Create Railway subdomain
          DOMAIN_RESPONSE=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceDomainCreate(input: { serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENV_ID\\\" }) { id domain } }\"}")
          echo "Domain response: $DOMAIN_RESPONSE"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
