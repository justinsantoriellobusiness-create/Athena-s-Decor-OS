name: Create Railway Domain

on:
  workflow_dispatch: {}

jobs:
  create-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI and create domain
        run: |
          npm install -g @railway/cli 2>/dev/null

          echo "=== Railway CLI version ==="
          railway --version || true

          echo "=== Linking project ==="
          railway link --project "$RAILWAY_PROJECT_ID" 2>&1 || true

          echo "=== Railway status ==="
          railway status 2>&1 || true

          echo "=== Railway status JSON ==="
          railway status --json 2>&1 || true

          echo "=== Creating domain ==="
          railway domain 2>&1 || true

          echo "=== Done ==="
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
